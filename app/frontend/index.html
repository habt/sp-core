<!DOCTYPE html>
<html>
<head>
  <title>LED Dashboard</title>

  <style>
   
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial;
      background: #111;
      color: white;
    }


    .container {
      display: grid;
      grid-template-rows: 100px 1fr;
      height: 100vh;
      width: 100vw;   /* Force full viewport width */
    }

    .header {
      background-color: #2c3e50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .content {
      display: grid;
      grid-template-columns: 2fr 1fr; /* 25% / 50% / 25% */
      width: 100%;
    }

    /* LEFT 1/4 of screen for LEDs */
    .led-panel {
      background: #1a1a1a;
      display: flex;
      flex-direction: row;      /* arrange LEDs horizontally */
      align-items: flex-start;  /* align to top of panel */
      justify-content: center;
      padding-top: 40px;           /* match main content padding */
      gap: 30px;
      border-right: 2px solid #333;
      flex-wrap: nowrap;           /* change to wrap if you want multiple rows */
    }

    .image-container {
      position: relative; /* needed for absolute positioning inside */
      display: inline-block;
    }

    .image-container img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* 25% Control Panel */
    .control-panel {
      background: #1a1a1a;
      padding: 20px;
      align-items: center;
      border-left: 2px solid #333;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }


    /* Remaining 1/2 area */
    .charts {
      padding: 40px;
      align-items: center;
      display: flex;
      flex-direction: column;
    }


    .led {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: gray;
      transition: all 0.3s ease;
    }

    .led-row {
      display: flex;
      flex-direction: column;
      align-items: center;     /* vertical centering */
      justify-content: center; /* horizontal centering */
      gap: 8px;
      width: 100%;              /* allow compact items so they sit side-by-side */

    }

   .led-label {
     font-size: 14px;
     margin-top: 4px;
   }

    .red    { background: red;    box-shadow: 0 0 25px red; }
    .green  { background: lime;   box-shadow: 0 0 25px lime; }
    .yellow { background: yellow; box-shadow: 0 0 25px yellow; }
    .blue   { background: cyan;   box-shadow: 0 0 25px cyan; }
    .orange { background: #e67e22; box-shadow: 0 0 25px #e67e22; }
    .off    { background: #333;   box-shadow: none; }

    input[type="number"] {
      padding: 5px;
      font-size: 14px;
    }

    button {
      padding: 10px;
      background: #444;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }

    h2 {
      margin-bottom: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
        Service Planner
    </div>

    <div class="content">
      <div class="charts">
        <div class="led-panel">
          <h2> </h2>

          <div class="led-row">
            <div id="led1" class="led"></div>
            <span class="led-label">Server1</span>
          </div>

          <div class="led-row">
            <div id="led2" class="led"></div>
            <span class="led-label">Server2</span>
          </div>

          <div class="led-row">
            <div id="led3" class="led"></div>
            <span class="led-label">Server3</span>
          </div>

          <div class="led-row">
            <div id="led4" class="led"></div>
            <span class="led-label">Server4</span>
          </div>

        </div>

        <div class="image-container">
          <img src="frontend/connected_car_light.png" alt="Panel Image">

          <!-- Buttons 
          <button class="image-button" id="btn1" onclick="alert('Button 1 clicked')"></button>
          <button class="image-button" id="btn2" onclick="alert('Button 2 clicked')"></button>
          <button class="image-button" id="btn3" onclick="alert('Button 3 clicked')"></button>
          -->
        </div>
      </div>
      <!-- Control Panel -->
      <div class="control-panel">
        <h2>SP Controls</h2>

        <label>Core Update Interval (secs):</label>
        <input type="number" id="value1">

        <!--
        <label>History Window (secs):</label>
        <input type="number" id="value2">
        -->

        <label>Sigma Level (0-6):</label>
        <input type="number" id="value3">

        <label>EWMA Coefficient (0-1):</label>
        <input type="number" id="value4">

        <label>Refresh Interval (secs):</label>
        <input type="number" id="value5">

        <button onclick="sendControl()">Set</button>
      </div>
    </div>
  </div>

<script>
async function fetchStatus() {
  const res = await fetch("/led/status");
  const data = await res.json();


  console.log(data);

  Object.keys(data).forEach(id => {
    const led = document.getElementById(id);
    led.className = "led " + data[id];
  });
}

// store the interval id (not the milliseconds value)
let refreshIntervalId = null;
const DEFAULT_INTERVAL_MS = 10000;

// start the periodic fetch immediately
refreshIntervalId = setInterval(fetchStatus, DEFAULT_INTERVAL_MS);
fetchStatus();

function getNumberOrNull(id) {
  const value = document.getElementById(id).value;
  return value === "" ? null : parseFloat(value);
}

async function sendControl() {
  const payload = {
    update: getNumberOrNull("value1"),
    //hysteresis: getNumberOrNull("value2"),
    sigma: getNumberOrNull("value3"),
    ewma: getNumberOrNull("value4")
  };

  console.log(payload);

  // stop previous interval
  if (refreshIntervalId !== null) {
    clearInterval(refreshIntervalId);
    refreshIntervalId = null;
  }

  // Update refresh interval
  const seconds = getNumberOrNull("value5") ?? 1;
  const intervalMs = Math.max(seconds * 1000, 1000); // minimum 1s

  // start new interval and keep its id
  refreshIntervalId = setInterval(fetchStatus, intervalMs);
  console.log("Refresh interval (ms):", intervalMs);

  await fetch("/control", {
    method: "POST",

// --- new: sync led-panel width to image width ---
function syncLedPanelWidth() {
  const img = document.querySelector('.image-container img');
  const ledPanel = document.querySelector('.led-panel');
  if (!img || !ledPanel) return;

  const applyWidth = () => {
    const w = Math.round(img.getBoundingClientRect().width);
    // apply width in px so led-panel equals the image width
    ledPanel.style.width = w + 'px';
  };

  // apply once now if image already loaded, otherwise after load
  if (img.complete) {
    applyWidth();
  } else {
    img.addEventListener('load', applyWidth, { once: true });
  }

  // keep in sync on resize
  window.addEventListener('resize', applyWidth);
}

</script>

</body>
</html>
